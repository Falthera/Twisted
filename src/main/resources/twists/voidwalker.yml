name: "Voidwalker"
display-name: "<gradient:#a29bfe:#6c5ce7>Voidwalker</gradient>"
description: "Master of the void. Teleport through shadows and manipulate space."
material: ENDER_PEARL

passive:
  # Increase ender pearl maximum distance
  pearl-range-multiplier: 2.0
  # Reduce ender pearl cooldown
  pearl-cooldown-reduction: 0.5
  # Increased fall damage multiplier
  fall-damage-multiplier: 1.5
  # Increased ender pearl damage taken
  pearl-damage-multiplier: 1.5

ability:
  name: "Void Step"
  material: CHORUS_FRUIT
  description: "Teleport forward through the void in the direction you are looking."
  # Range in blocks (default 15)
  range: 15
  cooldown: 20
  # Cooldown at stage 2
  stage-2:
    range: 25
    cooldown: 15
  # Cooldown at stage 3
  stage-3:
    range: 40
    cooldown: 10
  # Liquid handling
  pass-through-water: false
  pass-through-lava: false

evolution:
  stage-1:
    name: "Voidwalker"
    energy-required: 100
    essence-required: 0
    icon: ENDER_PEARL
    lore:
      - "<gray>Mastered the basics of void magic."
  stage-2:
    name: "Abyss Walker"
    energy-required: 150
    essence-required: 50
    icon: END_PORTAL_FRAME
    lore:
      - "<dark_aqua>Deeper into the abyss."
      - "<gray>Enhanced teleportation range and reduced cooldown."
  stage-3:
    name: "Singularity"
    energy-required: 200
    essence-required: 150
    icon: NETHER_STAR
    lore:
      - "<gold>You have become one with the void."
      - "< gray>Maximum teleportation power unleashed."

# Cosmetic particles
particles:
  void-step: PORTAL
  enabled: true
