name: Build and Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      version:
        description: "New version (e.g., 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Bump version
        id: bump
        shell: bash
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*.[0-9]*.[0-9]*' 2>/dev/null || echo "v0.0.0")
          CURRENT=${LATEST_TAG#v}

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            NEW_VERSION="${{ github.event.inputs.version }}"
          else
            IFS='.' read -ra PARTS <<< "$CURRENT"
            MAJOR=${PARTS[0]:-0}
            MINOR=${PARTS[1]:-0}
            PATCH=${PARTS[2]:-0}
            NEW_VERSION="$((MAJOR)).$((MINOR)).$((PATCH + 1))"
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: twisted-smp
          path: target/*.jar
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: twisted-smp
          path: target

      - name: Create Release Tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag "v${{ needs.build.outputs.version }}"
          git push origin "v${{ needs.build.outputs.version }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Release v${{ needs.build.outputs.version }}
          files: target/*.jar
          body: |
            ## TwistedSMP v${{ needs.build.outputs.version }}

            ### Features
            - 6 supernatural twists with unique abilities (Void Step, Earthquake, Blood Rage, Fade, Inferno Burst, Freeze)
            - 3-stage evolution system per twist
            - Energy, Essence, and Instability progression systems
            - Elite VFX: holograms, screen shake, particle explosions, damage numbers, layered sound design
            - Twisted Storm and Rift events with cinematic effects
            - PlaceholderAPI expansion for stats
            - Anti-abuse system with kill-farming guard
            - Custom crafting recipes

            ### Compatibility
            - Paper 1.21.11+
            - Java 21
          draft: false
          prerelease: false
          generate_release_notes: true
